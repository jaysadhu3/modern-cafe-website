<section class="py-24 bg-beige" *ngIf="config$ | async as config">

    <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-12">

        <!-- Contact Details -->
        <div>

            <h2 class="text-3xl font-heading text-gray-900">
                Visit Our Café
            </h2>

            <p class="mt-6 text-gray-700">
                📍 {{ config.contact.address }}
            </p>

            <p class="mt-3 text-gray-700">
                📞 {{ config.contact.phone }}
            </p>

            <p class="mt-3 text-gray-700">
                ✉ {{ config.contact.email }}
            </p>

            <p class="mt-3 text-gray-700">
                🕒 {{ config.contact.hours }}
            </p>

        </div>

        <!-- Google Map -->
        <div class="w-full h-[350px]">

            <iframe *ngIf="config.contact.mapEmbed" [src]="getSafeMapUrl(config.contact.mapEmbed)"
                class="w-full h-full rounded-lg border-0" loading="lazy">
            </iframe>

        </div>

    </div>

</section>
